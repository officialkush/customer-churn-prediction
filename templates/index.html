<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Customer Churn Prediction</h1>
    <p class="subtitle">Enter customer details to predict churn risk</p>

    <form action="/predict" method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Customer ID</label>
                <input type="number" name="CustomerID" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="Age" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select name="Gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tenure</label>
                <input type="number" name="Tenure" required>
            </div>

            <div class="form-group">
                <label>Usage Frequency</label>
                <input type="number" name="UsageFrequency" required>
            </div>

            <div class="form-group">
                <label>Support Calls</label>
                <input type="number" name="SupportCalls" required>
            </div>

            <div class="form-group">
                <label>Payment Delay</label>
                <input type="number" name="PaymentDelay" required>
            </div>

            <div class="form-group">
                <label>Subscription Type</label>
                <select name="SubscriptionType">
                    <option>Basic</option>
                    <option>Standard</option>
                    <option>Premium</option>
                </select>
            </div>

            <div class="form-group">
                <label>Contract Length</label>
                <select name="ContractLength">
                    <option>Monthly</option>
                    <option>Quarterly</option>
                    <option>Annual</option>
                </select>
            </div>

            <div class="form-group">
                <label>Total Spend</label>
                <input type="number" step="0.01" name="TotalSpend" required>
            </div>

            <div class="form-group">
                <label>Last Interaction</label>
                <input type="number" name="LastInteraction" required>
            </div>

        </div>

        <button type="submit">Predict Churn</button>

    </form>

    {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
    {% endif %}

    <p class="footer">Machine Learning Flask Deployment Project</p>

</div>

</body>
</html>
